name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install project
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check

      - name: Format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check

      - name: Unit tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/unit -q

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run --with twine python -m twine check dist/*
